name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'

      - name: Cache deps and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            deps/
            _build/
            priv/plts/
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get --check-locked

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Quality checks (format + credo + dialyzer)
        run: mix quality.ci

      - name: Run tests
        run: mix test
